<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Zengjie Zhang — Blogs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
</head>
<body>
  <div class="container">
    <header>
      <div>Zengjie Zhang</div>
      <nav>
        <a href="home.html">Home</a>
        <a href="blogs.html" class="active">Blogs</a>
      </nav>
    </header>

    <!-- Blog list -->
    <ul id="blog-list"></ul>

    <!-- Blog content -->
    <article id="blog-content"></article>

    <footer>
      © Zengjie Zhang · Blogs · <a href="mailto:zengjie@azonai.co">Contact</a>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/markdown-loader.js"></script>
  <script>
    // 初始化博客加载器
    const blogLoader = new MarkdownLoader({
      contentContainerId: 'blog-content',
      listContainerId: 'blog-list',
      indexUrl: 'blogs/index.json',
      contentType: 'blog'
    });
    
    blogLoader.init();
  </script>
</body>
</html>
